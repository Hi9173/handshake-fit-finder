services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: handshake_fit_finder
      MYSQL_USER: handshake
      MYSQL_PASSWORD: handshake
      MYSQL_ROOT_PASSWORD: handshake_root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
